<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Guesser ✨</title>
    <style>
        
        body {
            background-color: #ffe4e1; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            text-align: center;
            border: 4px solid #ffb6c1; 
            width: 300px;
        }

        h1 { color: #ff69b4; font-size: 1.5rem; }

        input {
            padding: 10px;
            border-radius: 15px;
            border: 2px solid #ffb6c1;
            margin: 15px 0;
            width: 80%;
            outline: none;
        }

        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {transform: scale(1.1); }

        #result {
            margin-top: 20px;
            font-weight: bold;
            color: #d02090;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Guess Your Age? 🎀</h1>
        <p style="color: #ffb6c1;">Enter your Birthday:</p>
        <input type="date" id="dob">
        <br>
        <button onclick="calculateAge()">Reveal My Age! ✨</button>
        <div id="result"></div>
    </div>

    <script>
        
        // 1. Initialize the audio object (replace 'short.mp3' with your filename)
const roastAudio = new Audio('Woman_in_pain_sound_effect_48KBPS.mp4'); 

const calculateAge = () => {
    const dateInput = document.getElementById('dob').value;
    const resultDiv = document.getElementById('result');

    if (!dateInput) {
        resultDiv.innerText = "Please pick a date first! 🌸";
        return;
    }

    resultDiv.innerText = "Calculating... ✨";

    setTimeout(() => {
        // 2. Play the sound
        roastAudio.play();
        
        // 3. Update the text
        resultDiv.innerText = "FUCK YOU 🐒🐒 ";
    }, 800);
};
    </script>

</body>
</html>
